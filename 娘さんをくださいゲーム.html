<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>娘さんをくださいゲーム</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      background-color: #fffbe6;
      padding: 40px;
    }
    #question {
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: bold;
      color: #b30000;
      word-break: break-word;
    }
    #explanation {
      font-size: 18px;
      color: #555;
      margin-bottom: 10px;
      height: 24px;
      min-height: 24px;
    }
    #message {
      font-size: 18px;
      margin-bottom: 15px;
      height: 24px;
      color: #d00;
    }
    input {
      width: 60%;
      padding: 10px;
      font-size: 18px;
      margin-bottom: 10px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 10px 5px;
      cursor: pointer;
    }
    .info {
      font-size: 18px;
      margin-top: 20px;
    }
    .score {
      font-size: 22px;
      font-weight: bold;
      color: #007700;
    }
    #table-wrapper {
      margin: 20px auto;
      max-width: 400px;
      background: #fff;
      border: 2px solid #b30000;
      border-radius: 8px;
      padding: 15px;
      color: #333;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 18px;
    }
    th, td {
      border: 1px solid #b30000;
      padding: 6px 8px;
    }
    th {
      background-color: #fce5e5;
    }
  </style>
</head>
<body>
  <h1>娘さんをくださいゲーム</h1>
「娘さんをください」→「おまえにはやらん」で突き返せ！
  
  <div id="question">ゲームスタート！</div>
  <div id="explanation"></div>
  <div id="message"></div>
  
  <input type="text" id="answerInput" placeholder="ここに変換して入力" onkeydown="if(event.key==='Enter'){checkAnswer()}" autocomplete="off" disabled />
  <br />
  
  <button onclick="startGame()">スタート</button>
  <button onclick="skipQuestion()">スキップ</button>
  <button onclick="endGame()">ゲーム終了</button>
  
  <div class="info">
    スコア: <span class="score" id="score">0</span> / 残り時間: <span id="time">45</span> 秒
  </div>
  
  <div id="table-wrapper">
    <h2>対応表</h2>
    <table>
      <thead><tr><th>入力語句</th><th>返答語句</th></tr></thead>
      <tbody>
        <tr><td>娘さんを</td><td>おまえには</td></tr>
        <tr><td>さんをください</td><td>にはやらん</td></tr>
        <tr><td>娘</td><td>おまえ</td></tr>
        <tr><td>さんを</td><td>には</td></tr>
        <tr><td>ください</td><td>やらん</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const map = {
      "娘さんを": "おまえには",
      "さんをください": "にはやらん",
      "娘": "おまえ",
      "さんを": "には",
      "ください": "やらん"
    };

    const words = ["娘", "ください", "娘さんを", "さんをください"];
    const fixedQuestions = ["娘さんをください", "ください娘さんを"];

    const explanations = {
      "娘さんをください": [
        "娘と結婚したい彼氏を追い返せ！",
        "さあ、彼氏にお断りの返答をしよう",
        "君の使命は娘を守ることだ！"
      ],
      "ください娘さんを": [
        "逆順パターンも油断するな！",
        "言葉の順番もチェックしよう！",
        "混乱に負けるな、冷静に！"
      ],
      "default": [
        "正確に返答してスコアを伸ばそう",
        "間違えたらやり直しだ！",
        "素早く正確に返答しよう！"
      ]
    };

    let score = 0;
    let timeLeft = 45;
    let timer = null;
    let currentQuestion = "";
    let questionCount = 0;

    function splitToWords(text) {
      const sortedKeys = Object.keys(map).sort((a,b)=>b.length - a.length);
      const regex = new RegExp(sortedKeys.join("|"), "g");
      return text.match(regex) || [];
    }

    function getAnswer(question) {
      return splitToWords(question).map(w => map[w]).join("");
    }

    function createRandomQuestion() {
      // 1〜3語のランダム連結
      const length = Math.floor(Math.random() * 3) + 1;
      let question = "";
      for(let i=0; i<length; i++) {
        question += words[Math.floor(Math.random() * words.length)];
      }
      return question;
    }

    function showExplanation(question) {
      const explanationDiv = document.getElementById("explanation");
      let texts = explanations[question] || explanations["default"];
      const text = texts[Math.floor(Math.random() * texts.length)];
      explanationDiv.textContent = text;
    }

    function nextQuestion() {
      questionCount++;
      if (questionCount === 1) {
        currentQuestion = "娘さんをください";
      } else if (questionCount === 2) {
        currentQuestion = "ください娘さんを";
      } else {
        currentQuestion = createRandomQuestion();
      }
      document.getElementById("question").textContent = currentQuestion;
      showExplanation(currentQuestion);
      document.getElementById("answerInput").value = "";
      document.getElementById("message").textContent = "";
      document.getElementById("answerInput").disabled = false;
      document.getElementById("answerInput").focus();
    }

    function checkAnswer() {
      const input = document.getElementById("answerInput").value.trim();
      const expected = getAnswer(currentQuestion);
      if (input === expected && input !== "") {
        score += input.length;
        document.getElementById("score").textContent = score;
        nextQuestion();
      } else {
        document.getElementById("message").textContent = "違います。もう一度入力してください。";
        document.getElementById("answerInput").focus();
      }
    }

    function skipQuestion() {
      document.getElementById("message").textContent = "スキップしました。";
      nextQuestion();
    }

    function startGame() {
      score = 0;
      timeLeft = 45;
      questionCount = 0;
      document.getElementById("score").textContent = score;
      document.getElementById("time").textContent = timeLeft;
      document.getElementById("message").textContent = "";
      document.getElementById("answerInput").disabled = false;
      nextQuestion();

      if (timer) clearInterval(timer);
      timer = setInterval(() => {
        timeLeft--;
        document.getElementById("time").textContent = timeLeft;
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    function endGame() {
      clearInterval(timer);
      timer = null;
      document.getElementById("question").textContent = "ゲーム終了！お疲れさまでした。";
      document.getElementById("explanation").textContent = "";
      document.getElementById("message").textContent = "";
      document.getElementById("answerInput").value = "";
      document.getElementById("answerInput").disabled = true;
    }
  </script>
</body>
</html>
